<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagamento - FastPOS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8fafc; }
    .card-retorno {
      max-width: 460px;
      margin: 80px auto;
      border-radius: 20px;
      border: none;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      padding: 40px 32px;
      text-align: center;
    }
    .icone-grande { font-size: 4rem; }
  </style>
</head>
<body>
<div class="card-retorno card">
  <div id="conteudo">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <p class="text-muted">Verificando pagamento...</p>
  </div>
</div>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  // MP pode enviar: collection_status, payment_status, status
  const status = (params.get('collection_status') || params.get('payment_status') || params.get('status') || '').toLowerCase();

  const div = document.getElementById('conteudo');

  if (status === 'approved' || status === 'authorized') {
    div.innerHTML = `
      <div class="icone-grande text-success mb-3">✅</div>
      <h4 class="fw-bold">Pagamento aprovado!</h4>
      <p class="text-muted mb-4">Sua assinatura está sendo ativada. Em alguns instantes seu acesso será liberado.</p>
      <a href="/" class="btn btn-success px-4">Acessar o sistema</a>`;
  } else if (status === 'pending' || status === 'in_process') {
    div.innerHTML = `
      <div class="icone-grande text-warning mb-3">⏳</div>
      <h4 class="fw-bold">Pagamento em análise</h4>
      <p class="text-muted mb-4">Seu pagamento está sendo processado. Você receberá uma confirmação em breve.</p>
      <a href="/" class="btn btn-warning px-4">Voltar ao início</a>`;
  } else if (status === 'rejected' || status === 'cancelled') {
    div.innerHTML = `
      <div class="icone-grande text-danger mb-3">❌</div>
      <h4 class="fw-bold">Pagamento não aprovado</h4>
      <p class="text-muted mb-4">O pagamento foi recusado ou cancelado. Tente novamente com outro cartão.</p>
      <a href="/pages/assinatura.html" class="btn btn-primary px-4">Tentar novamente</a>`;
  } else {
    // Status desconhecido — mostra mensagem genérica
    div.innerHTML = `
      <div class="icone-grande text-info mb-3">ℹ️</div>
      <h4 class="fw-bold">Processando assinatura</h4>
      <p class="text-muted mb-4">Assim que o pagamento for confirmado, seu acesso será ativado automaticamente.</p>
      <a href="/pages/assinatura.html" class="btn btn-outline-primary me-2">Ver assinatura</a>
      <a href="/" class="btn btn-primary">Ir ao sistema</a>`;
  }
})();
</script>
</body>
</html>
