<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview Caixa Right</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/app.css?v=3">
<style>
  body { background: #f0f2f5; display: flex; justify-content: center; padding: 2rem; }
  .preview-wrap { width: 320px; display: flex; flex-direction: column; gap: .4rem; }
</style>
</head>
<body>
<div class="preview-wrap">

  <!-- Bloco unificado Desconto/Acréscimo + Total -->
  <div style="border-radius:8px;overflow:hidden">
    <div id="card-desconto-wrap" style="background:var(--card-bg);border:1px solid var(--card-border);border-bottom:none;padding:.5rem .6rem">
      <div class="row g-1">
        <div class="col-6">
          <div class="d-flex align-items-center justify-content-between mb-1">
            <span style="font-size:.78rem;font-weight:600;color:#dc3545"><i class="bi bi-dash-circle me-1"></i>Desconto no Total</span>
            <div class="btn-group btn-group-sm">
              <button type="button" class="btn btn-outline-secondary py-0 px-1 tipo-toggle ativo" style="font-size:1rem;font-weight:700">R$</button>
              <button type="button" class="btn btn-outline-secondary py-0 px-1 tipo-toggle"       style="font-size:1rem;font-weight:700">%</button>
            </div>
          </div>
          <input class="form-control form-control-sm" placeholder="0,00" style="font-size:.82rem;text-align:right">
        </div>
        <div class="col-6">
          <div class="d-flex align-items-center justify-content-between mb-1">
            <span style="font-size:.78rem;font-weight:600;color:#0d6efd"><i class="bi bi-plus-circle me-1"></i>Acréscimo no Total</span>
            <div class="btn-group btn-group-sm">
              <button type="button" class="btn btn-outline-secondary py-0 px-1 tipo-toggle ativo" style="font-size:1rem;font-weight:700">R$</button>
              <button type="button" class="btn btn-outline-secondary py-0 px-1 tipo-toggle"       style="font-size:1rem;font-weight:700">%</button>
            </div>
          </div>
          <input class="form-control form-control-sm" placeholder="0,00" style="font-size:.82rem;text-align:right">
        </div>
      </div>
    </div>
    <div class="total-box" style="border-radius:0 0 8px 8px">
      <div class="total-label">TOTAL A PAGAR</div>
      <div class="total-value">R$ 0,00</div>
      <div style="font-size:.7rem;opacity:.75"></div>
    </div>
  </div>

  <!-- Botão Finalizar -->
  <button class="btn btn-pdv w-100 py-2 fw-bold" style="font-size:1rem">
    <i class="bi bi-check-circle me-1"></i>FINALIZAR VENDA
  </button>

</div>
</body>
</html>
